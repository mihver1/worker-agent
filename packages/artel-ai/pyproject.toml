[project]
name = "artel-ai"
version = "0.1.0"
description = "Unified async LLM API — multi-provider streaming, OAuth, token tracking"
requires-python = ">=3.12"
license = "MIT"
dependencies = [
    "boto3>=1.40.0",
    "httpx>=0.27",
    "google-auth>=2.39.0",
    "pydantic>=2.0",
    "urllib3>=2.2.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/artel_ai"]
