[project]
name = "artel-tui"
version = "0.1.0"
description = "Terminal UI client for Artel agent"
requires-python = ">=3.12"
license = "MIT"
dependencies = [
    "artel-core",
    "httpx>=0.27",
    "websockets>=14.0",
    "textual>=1.0",
    "rich>=13.0",
    "rumps>=0.4.0; sys_platform == 'darwin'",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/artel_tui"]

[tool.uv.sources]
artel-core = { workspace = true }
