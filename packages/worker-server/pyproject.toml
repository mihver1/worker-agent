[project]
name = "worker-server"
version = "0.1.0"
description = "WebSocket/HTTP server for remote agent access"
requires-python = ">=3.12"
license = "MIT"
dependencies = [
    "worker-core",
    "websockets>=14.0",
    "aiohttp>=3.10",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/worker_server"]

[tool.uv.sources]
worker-core = { workspace = true }
