[project]
name = "artel-core"
version = "0.1.0"
description = "Agent runtime — tool loop, sessions, extensions, config, permissions"
requires-python = ">=3.12"
license = "MIT"
dependencies = [
    "artel-ai",
    "pydantic>=2.0",
    "aiosqlite>=0.20",
    "tomli>=2.0; python_version < '3.11'",
    "tomli-w>=1.0",
    "click>=8.0",
    "httpx>=0.27",
    "mcp>=1.12.4",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/artel_core"]

[tool.uv.sources]
artel-ai = { workspace = true }
