[project]
name = "artel-web"
version = "0.1.0"
description = "Web UI client for Artel"
requires-python = ">=3.12"
license = "MIT"
dependencies = [
    "artel-core",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/artel_web"]

[tool.uv.sources]
artel-core = { workspace = true }
