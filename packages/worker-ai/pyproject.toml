[project]
name = "worker-ai"
version = "0.1.0"
description = "Unified async LLM API — multi-provider streaming, OAuth, token tracking"
requires-python = ">=3.12"
license = "MIT"
dependencies = [
    "httpx>=0.27",
    "pydantic>=2.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/worker_ai"]
